<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <title>Planificador de Horarios</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <h1>Planificador de Horarios</h1>

        <section class="formulario">
            <h2>Agregar comisión</h2>

            <input id="nombre" placeholder="Nombre materia" />

            <select id="dia">
                <option>Lunes</option>
                <option>Martes</option>
                <option>Miércoles</option>
                <option>Jueves</option>
                <option>Viernes</option>
            </select>

            Inicio
            <input type="time" id="inicio" />

            Fin
            <input type="time" id="fin" />

            <button onclick="agregarComision()">Agregar</button>
        </section>

        <section>
            <h2>Comisiones cargadas</h2>
            <ul id="listaMaterias"></ul>
        </section>

        <section>
            <button onclick="generarHorarios()">Generar combinaciones</button>

            <div id="contador"></div>
        </section>

        <section>
            <h2>Horario</h2>

            <button onclick="prev()">←</button>
            <button onclick="next()">→</button>

            <div id="grid"></div>
        </section>

        <!-- Modal para editar comisión -->
        <div id="modalEditar" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>Editar Comisión</h3>
                <label>Nombre: <input type="text" id="editNombre" /></label><br />
                <label>
                    Día:
                    <select id="editDia">
                        <option>Lunes</option>
                        <option>Martes</option>
                        <option>Miércoles</option>
                        <option>Jueves</option>
                        <option>Viernes</option>
                    </select>
                </label>
                <br />
                <label>Inicio: <input type="time" id="editInicio" /></label><br />
                <label>Fin: <input type="time" id="editFin" /></label><br />
                <br />
                <button id="guardarEdicion">Guardar</button>
                <button id="cerrarModal">Cancelar</button>
            </div>
        </div>

        <script src="scheduler.js"></script>
        <script src="storage.js"></script>
        <script src="app.js"></script>

    </body>
</html>
